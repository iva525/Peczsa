<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glovo UI MVP</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f6f6f6;
}

/* TOP */
header{
background:#00c853;
color:white;
padding:14px;
text-align:center;
font-weight:bold;
}

/* LOGIN */
#auth{
padding:20px;
background:white;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border:1px solid #ddd;
border-radius:8px;
}

button{
width:100%;
padding:10px;
margin:6px 0;
background:#00c853;
border:none;
color:white;
border-radius:8px;
}

/* APP */
#app{
display:none;
padding-bottom:80px;
}

/* FOOD CARD */
.card{
background:white;
margin:10px;
padding:12px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* BOTTOM BAR */
.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
background:white;
border-top:1px solid #ddd;
}

.bottom button{
flex:1;
background:none;
color:black;
font-weight:bold;
}

/* CHAT */
.chat{
height:150px;
overflow:auto;
background:#eee;
padding:8px;
border-radius:8px;
}
</style>
</head>

<body>

<header>🚚 Glovo MVP</header>

<!-- LOGIN -->
<div id="auth">
<h3>Login</h3>
<input id="email" placeholder="email">
<input id="pass" placeholder="password">

<button onclick="login()">Войти</button>
<button onclick="register()">Регистрация</button>
</div>

<!-- APP -->
<div id="app">

<!-- MENU -->
<div id="menu">
<div class="card">🍕 Margherita <button onclick="add('Margherita')">+</button></div>
<div class="card">🍕 Pepperoni <button onclick="add('Pepperoni')">+</button></div>
<div class="card">🍕 4 Cheese <button onclick="add('4 Cheese')">+</button></div>
</div>

<!-- ORDERS -->
<div id="orders" style="display:none;"></div>

<!-- CHAT -->
<div id="chatTab" style="display:none;">
<div class="chat" id="chat"></div>
<input id="msg" placeholder="сообщение">
<button onclick="send()">Send</button>
</div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom" id="nav" style="display:none;">
<button onclick="show('menu')">Menu</button>
<button onclick="show('orders')">Orders</button>
<button onclick="show('chatTab')">Chat</button>
</div>

<script>

let cart=[];

/* LOGIN */
function login(){
document.getElementById("auth").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("nav").style.display="flex";
}

function register(){
login();
}

/* NAV */
function show(tab){
document.getElementById("menu").style.display="none";
document.getElementById("orders").style.display="none";
document.getElementById("chatTab").style.display="none";

document.getElementById(tab).style.display="block";
}

/* CART */
function add(item){
cart.push(item);
alert(item + " добавлено");
}

/* CHAT */
function send(){
if(!msg.value) return;

document.getElementById("chat").innerHTML +=
"<div>You: " + msg.value + "</div>";

msg.value="";
}

</script>

</body>
</html>
